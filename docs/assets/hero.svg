<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" width="860" height="280" role="img" aria-label="pkpass Quick Look">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2a52"/>
      <stop offset="0.55" stop-color="#146ec8"/>
      <stop offset="1" stop-color="#27c0d8"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="860" height="280" rx="22" fill="url(#sky)"/>
  <rect width="860" height="140" rx="22" fill="url(#glass)"/>

  <!-- drifting stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="50" r="1.6" opacity="0.7">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="36" r="1.2" opacity="0.5">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="2.3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="62" r="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.8s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="40" r="1.3" opacity="0.5">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.4s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- dashed flight path -->
  <path id="route" d="M70 200 C 260 120, 600 120, 800 196" fill="none"
        stroke="#ffffff" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="6 8"/>

  <!-- airplane flying along the route -->
  <g>
    <g transform="translate(-16,-16)">
      <path d="M2 16 L30 9 L26 16 L30 23 Z M12 16 L20 14 L20 18 Z" fill="#ffffff"/>
    </g>
    <animateMotion dur="6s" repeatCount="indefinite" rotate="auto" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#route"/>
    </animateMotion>
  </g>

  <!-- title -->
  <text x="70" y="120" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="46" font-weight="800" fill="#ffffff">pkpass Quick Look</text>
  <text x="72" y="156" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="19" fill="#dfeeff" opacity="0.92">Press Space. See your Wallet pass. Never open it.</text>

  <!-- little pass chip -->
  <g transform="translate(70,196)">
    <rect width="240" height="56" rx="12" fill="#ffffff" opacity="0.12"/>
    <text x="16" y="24" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#cfe6ff" letter-spacing="1">SAN FRANCISCO → LONDON</text>
    <text x="16" y="45" font-family="-apple-system, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#ffffff">SFO ✈ LHR</text>
    <rect x="196" y="12" width="32" height="32" rx="5" fill="#ffffff"/>
    <g fill="#146ec8">
      <rect x="201" y="17" width="6" height="6"/><rect x="211" y="17" width="6" height="6"/><rect x="217" y="17" width="6" height="6"/>
      <rect x="201" y="27" width="6" height="6"/><rect x="217" y="27" width="6" height="6"/>
      <rect x="201" y="33" width="6" height="6"/><rect x="211" y="33" width="6" height="6"/>
    </g>
  </g>
</svg>
